name: Code Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  static-analysis:
    name: Static Analysis
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: 🛎 Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: '${{ secrets.WORKFLOW_COMMIT }}'

      - name: 📦 Install ruff
        uses: astral-sh/ruff-action@v4.0.0

      - name: 📝 Format Code
        run: ruff format

      - name: 🔍 Lint Code
        run: ruff check --fix

      - name: ✅ Commit Code Format Changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Ruff static analysis"

  type-check:
    name: Type Check
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: 🛎 Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: 🔭 Install UV
        uses: astral-sh/setup-uv@v8.2.0
        with:
          activate-environment: 'true'
      
      - name: 🔄 Sync Dependencies
        run: uv sync

      - name: 🔍 Type Check
        run: pyrefly check --output-format=github