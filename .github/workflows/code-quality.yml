name: Code Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  static-analysis:
    name: Static Analysis
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🛎 Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: 📦 Install ruff
        uses: astral-sh/ruff-action@v4.0.0

      - name: 📝 Format Code
        run: ruff format --check

      - name: 🔍 Lint Code
        run: ruff check

  type-check:
    name: Type Check
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 🛎 Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: 🔭 Install UV
        uses: astral-sh/setup-uv@v8.2.0
        with:
          activate-environment: 'true'

      - name: 🔄 Sync Dependencies
        run: uv sync

      - name: 🔍 Type Check
        run: pyrefly check --output-format=github
